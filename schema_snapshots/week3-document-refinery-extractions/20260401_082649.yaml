kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week3 Document Refinery Extractions
  version: 1.0.0
  owner: week3-team
  description: Auto-generated contract for extractions_violated.
servers:
  local:
    type: local
    path: outputs\week3\extractions_violated.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract.
  limitations: Generated from observed data and should be reviewed.
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
  source_path:
    type: string
    required: true
  source_hash:
    type: string
    required: true
    pattern: ^[a-f0-9]{64}$
  extracted_facts.__len__:
    type: string
    required: true
  extracted_facts[].confidence:
    type: number
    required: true
    minimum_observed: 71.0
    maximum_observed: 91.0
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. Must remain in 0.0-1.0 float range. Breaking change
      if converted to 0-100 scale.
  extracted_facts[].entity_refs:
    type: string
    required: true
    enum:
    - '[]'
  extracted_facts[].fact_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
    enum:
    - a20ea073-6ad7-4484-bbac-3224daed8e29
    - a0c3453e-aaf1-438d-ad97-b9a7f4cae42f
    - 2bf5e10d-2d15-4185-94af-3d8f8eddf05a
    - 0e8aeeb4-0aed-4bab-a91a-9d8043fc0f9c
    - 1796df52-bf0a-4c48-8b6a-57834481f2c4
  extracted_facts[].page_ref:
    type: integer
    required: true
    minimum_observed: 1.0
    maximum_observed: 1.0
  extracted_facts[].source_excerpt:
    type: string
    required: true
    enum:
    - Example excerpt
  extracted_facts[].text:
    type: string
    required: true
    enum:
    - Sample extracted fact
  entities.__len__:
    type: string
    required: true
  entities:
    type: string
    required: true
    enum:
    - '[]'
  extraction_model:
    type: string
    required: true
    enum:
    - gpt-4
  processing_time_ms:
    type: integer
    required: true
    minimum: 1
  token_count.input:
    type: string
    required: true
  token_count.output:
    type: string
    required: true
  extracted_at:
    type: string
    required: true
    format: date-time
quality:
  type: SodaChecks
  specification:
    checks for extractions_violated:
    - missing_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extracted_facts.__len__) = 0
    - missing_count(extracted_facts[].confidence) = 0
    - min(extracted_facts[].confidence) >= 0.0
    - max(extracted_facts[].confidence) <= 1.0
    - missing_count(extracted_facts[].entity_refs) = 0
    - accepted_values(extracted_facts[].entity_refs) in ['[]']
    - missing_count(extracted_facts[].fact_id) = 0
    - accepted_values(extracted_facts[].fact_id) in ['a20ea073-6ad7-4484-bbac-3224daed8e29',
      'a0c3453e-aaf1-438d-ad97-b9a7f4cae42f', '2bf5e10d-2d15-4185-94af-3d8f8eddf05a',
      '0e8aeeb4-0aed-4bab-a91a-9d8043fc0f9c', '1796df52-bf0a-4c48-8b6a-57834481f2c4']
    - missing_count(extracted_facts[].page_ref) = 0
    - missing_count(extracted_facts[].source_excerpt) = 0
    - accepted_values(extracted_facts[].source_excerpt) in ['Example excerpt']
    - missing_count(extracted_facts[].text) = 0
    - accepted_values(extracted_facts[].text) in ['Sample extracted fact']
    - missing_count(entities.__len__) = 0
    - missing_count(entities) = 0
    - accepted_values(entities) in ['[]']
    - missing_count(extraction_model) = 0
    - accepted_values(extraction_model) in ['gpt-4']
    - missing_count(processing_time_ms) = 0
    - min(processing_time_ms) >= 1
    - missing_count(token_count.input) = 0
    - missing_count(token_count.output) = 0
    - missing_count(extracted_at) = 0
    - row_count >= 1
lineage:
  upstream: []
  downstream: []
